<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backupwallet Successful</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #EBF0F5;
        }

        .set-img img {
            width: 10rem;
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-model {
            background: white;
            box-shadow: 0px 2px 6px #dddd;
            padding: 6rem;

        }

        .sub-model {
            text-align: center;
        }

        .ps h1 {
            font-family: system-ui;
            font-weight: 900;
            color: #47ba5b;
        }

        .ps p {
            font-size: 21px;
            font-family: sans-serif;
        }
    </style>
</head>

<body>
    <main>
        <div class="main-model">
            <div class="sub-model">
                <div class="set-img">
                    <img src="./img/good.jpg" alt="loading.....">
                </div>
                <div class="ps">
                    <h1>Success</h1>
                    <p>We received your request; <br>
                        This is your Transaction id : <b id="scrabble"></b><br>
                        we'll be in touch shortly!</p>
                </div>
            </div>
        </div>
    </main>



    <script>
        // Function to get query parameters
        const getQueryParam = (param) => {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        };

        // Extract the token from the URL
        const token = getQueryParam('code');

        // Display the token or use it as needed
        if (token) {
            document.getElementById('scrabble').textContent =  token;
            // You can use the token for further processing here
        } else {
            document.getElementById('scrabble').textContent = "No token found.";
        }
    </script>
</body>

</html>
